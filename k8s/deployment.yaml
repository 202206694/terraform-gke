apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-td-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-td-app
  template:
    metadata:
      labels:
        app: frontend-td-app
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
        env:
        - name: PROFESOR
          valueFrom:
            configMapKeyRef:
              name: app-td-config
              key: PROFESOR
        - name: GOOGLE_CLOUD_BUCKET
          valueFrom:
            configMapKeyRef:
              name: app-td-config
              key: BUCKET_NAME
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html-volume
        persistentVolumeClaim:
          claimName: frontend-td-app-pvc