<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Integrantes del Grupo</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
	<style>
		:root {
			--ink: #1c2a2e;
			--soft-ink: #4f666c;
			--paper: #f8f7f4;
			--accent: #e46f44;
			--accent-dark: #b84e2a;
			--card-1: #fff0e6;
			--card-2: #e7f4f2;
			--card-3: #fcefd8;
			--shadow: 0 14px 35px rgba(28, 42, 46, 0.14);
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			font-family: "Sora", sans-serif;
			color: var(--ink);
			background:
				radial-gradient(circle at 15% 15%, #ffe2c8 0, transparent 34%),
				radial-gradient(circle at 85% 20%, #d6f0ec 0, transparent 40%),
				radial-gradient(circle at 50% 100%, #ffecc9 0, transparent 35%),
				var(--paper);
			display: grid;
			place-items: center;
			padding: 2rem 1rem;
		}

		.container {
			width: min(1000px, 100%);
			background: rgba(255, 255, 255, 0.78);
			border: 1px solid rgba(255, 255, 255, 0.92);
			border-radius: 28px;
			box-shadow: var(--shadow);
			backdrop-filter: blur(4px);
			overflow: hidden;
			animation: rise 700ms ease-out;
		}

		.hero {
			padding: 2.8rem 1.6rem 1.7rem;
			text-align: center;
			position: relative;
		}

		.hero::after {
			content: "";
			width: 120px;
			height: 4px;
			border-radius: 999px;
			background: linear-gradient(90deg, var(--accent), #efb06f);
			position: absolute;
			left: 50%;
			bottom: 0;
			transform: translateX(-50%);
		}

		h1 {
			margin: 0;
			font-family: "Space Grotesk", sans-serif;
			font-size: clamp(1.7rem, 2.7vw + 1rem, 3rem);
			line-height: 1.1;
			letter-spacing: 0.4px;
		}

		.subtitle {
			margin: 0.9rem auto 0;
			max-width: 660px;
			color: var(--soft-ink);
			font-size: clamp(0.96rem, 1.2vw + 0.4rem, 1.18rem);
		}

		.grid {
			padding: 2rem 1.3rem 2.5rem;
			display: grid;
			grid-template-columns: repeat(3, minmax(0, 1fr));
			gap: 1rem;
		}

		.card {
			border-radius: 20px;
			padding: 1.2rem;
			min-height: 170px;
			display: flex;
			flex-direction: column;
			justify-content: space-between;
			border: 1px solid rgba(28, 42, 46, 0.06);
			transform: translateY(16px);
			opacity: 0;
			animation: pop 650ms ease forwards;
		}

		.card:nth-child(1) { background: var(--card-1); animation-delay: 120ms; }
		.card:nth-child(2) { background: var(--card-2); animation-delay: 260ms; }
		.card:nth-child(3) { background: var(--card-3); animation-delay: 400ms; }

		.label {
			font-size: 0.82rem;
			text-transform: uppercase;
			letter-spacing: 1px;
			color: var(--soft-ink);
			font-weight: 600;
		}

		.name {
			margin: 0.35rem 0 0;
			font-family: "Space Grotesk", sans-serif;
			font-size: clamp(1.35rem, 2vw, 1.8rem);
			color: var(--ink);
		}

		.pill {
			align-self: flex-start;
			margin-top: 0.9rem;
			padding: 0.36rem 0.68rem;
			border-radius: 999px;
			background: rgba(255, 255, 255, 0.7);
			color: var(--accent-dark);
			font-size: 0.8rem;
			font-weight: 600;
			border: 1px solid rgba(228, 111, 68, 0.22);
		}

		@keyframes rise {
			from {
				transform: translateY(12px);
				opacity: 0;
			}
			to {
				transform: translateY(0);
				opacity: 1;
			}
		}

		@keyframes pop {
			to {
				transform: translateY(0);
				opacity: 1;
			}
		}

		@media (max-width: 820px) {
			.grid {
				grid-template-columns: 1fr;
				gap: 0.9rem;
				padding-top: 1.5rem;
			}

			.card {
				min-height: 145px;
			}
		}
	</style>
</head>
<body>
	<main class="container">
		<section class="hero">
			<h1>Integrantes del Grupo</h1>
			<p class="subtitle">Este equipo está formado por tres personas con mucha energía: Pati, Claudia y Juanda.</p>
		</section>

		<section class="grid" aria-label="Miembros del grupo">
			<article class="card">
				<span class="label">Integrante 01</span>
				<h2 class="name">Pati</h2>
				<span class="pill">Creatividad</span>
			</article>

			<article class="card">
				<span class="label">Integrante 02</span>
				<h2 class="name">Claudia</h2>
				<span class="pill">Liderazgo</span>
			</article>

			<article class="card">
				<span class="label">Integrante 03</span>
				<h2 class="name">Juanda</h2>
				<span class="pill">Panbimbo</span>
			</article>
		</section>
	</main>
</body>
</html>
